name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  version:
    name: Compute release version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\r')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release
      - name: Zip artifact
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath gazoo-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: gazoo-windows
          path: gazoo-windows.zip

  build-macos:
    name: Build macOS
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter config --enable-macos-desktop
      - run: flutter build macos --release
      - name: Zip artifact
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent gazoo.app ../../../../../gazoo-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: gazoo-macos
          path: gazoo-macos.zip

  build-linux:
    name: Build Linux
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter config --enable-linux-desktop
      - run: flutter build linux --release
      - name: Zip artifact
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../gazoo-linux.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: gazoo-linux
          path: gazoo-linux.zip

  build-android:
    name: Build Android (signed APK)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/gazoo-release.jks"
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=$RUNNER_TEMP/gazoo-release.jks"
            } > android/key.properties
            echo "Release keystore restored — building a signed release APK."
          else
            echo "No keystore secrets — release APK will be debug-signed."
          fi
      - run: flutter pub get
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk gazoo-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: gazoo-android
          path: gazoo-android.apk

  build-ios:
    name: Build iOS (unsigned, best-effort)
    needs: test
    runs-on: macos-latest
    # No Apple signing certificate/provisioning profile is configured as a
    # secret in this repo, so this produces an UNSIGNED .app only — useful
    # to confirm the iOS build compiles, not directly installable on a real
    # device. Add APPLE_* signing secrets and a proper export step to
    # produce a real .ipa; until then this job is allowed to fail without
    # blocking the release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Zip artifact
        run: |
          cd build/ios/iphoneos
          zip -r ../../../gazoo-ios-unsigned.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: gazoo-ios-unsigned
          path: gazoo-ios-unsigned.zip

  release:
    name: Create GitHub Release
    needs: [version, build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f ! -name 'SHA256SUMS.txt' -exec shasum -a 256 {} \; \
            | sed 's#\./[^/]*/##' > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Gazoo ${{ needs.version.outputs.version }} (build ${{ github.run_number }})
          generate_release_notes: true
          files: |
            artifacts/*/*
            artifacts/SHA256SUMS.txt
